<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Animated Data Waves -->
  <path d="M 0 150 Q 100 100 200 150 T 400 150 T 600 150 T 800 150" fill="none" stroke="#38BDF8" stroke-width="4" opacity="0.3">
    <animate attributeName="d" 
             values="M 0 150 Q 100 100 200 150 T 400 150 T 600 150 T 800 150;
                     M 0 150 Q 100 200 200 150 T 400 150 T 600 150 T 800 150;
                     M 0 150 Q 100 100 200 150 T 400 150 T 600 150 T 800 150" 
             dur="5s" repeatCount="indefinite" />
  </path>
  
  <path d="M 0 170 Q 150 120 300 170 T 600 170 T 800 170" fill="none" stroke="#818CF8" stroke-width="3" opacity="0.3">
    <animate attributeName="d" 
             values="M 0 170 Q 150 120 300 170 T 600 170 T 800 170;
                     M 0 170 Q 150 220 300 170 T 600 170 T 800 170;
                     M 0 170 Q 150 120 300 170 T 600 170 T 800 170" 
             dur="4s" repeatCount="indefinite" />
  </path>
  
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">
    Genomics Data Scientist
  </text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#94A3B8" text-anchor="middle">
    Interview Questions &amp; Answers
  </text>
  
  <!-- Animated DNA-like elements on the left -->
  <g opacity="0.8">
    <circle cx="60" cy="100" r="6" fill="#38BDF8">
      <animate attributeName="cy" values="70;130;70" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="80" cy="100" r="6" fill="#818CF8">
      <animate attributeName="cy" values="130;70;130" dur="3s" repeatCount="indefinite" />
    </circle>
    <line x1="60" y1="70" x2="80" y2="130" stroke="#475569" stroke-width="2">
      <animate attributeName="y1" values="70;130;70" dur="3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="130;70;130" dur="3s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Animated DNA-like elements on the right -->
  <g opacity="0.8">
    <circle cx="720" cy="100" r="6" fill="#38BDF8">
      <animate attributeName="cy" values="130;70;130" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="740" cy="100" r="6" fill="#818CF8">
      <animate attributeName="cy" values="70;130;70" dur="3s" repeatCount="indefinite" />
    </circle>
    <line x1="720" y1="130" x2="740" y2="70" stroke="#475569" stroke-width="2">
      <animate attributeName="y1" values="130;70;130" dur="3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="70;130;70" dur="3s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
